
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>둘둘치킨 보안 E-book 전용 플립북 뷰어</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='white'/%3E%3Cpath d='M50 82 C30 64 10 48 10 28 C10 12 24 4 38 10 C44 13 49 20 50 23 C51 20 56 13 62 10 C76 4 90 12 90 28 C90 48 70 64 50 82Z' fill='%23E60012'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/turn-js/turn.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body, html { width: 100%; height: 100%; background: #0f172a; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        .lock-screen { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; z-index: 999; }
        .lock-screen i { font-size: 48px; color: #E60012; margin-bottom: 15px; }
        .lock-screen h2 { font-size: 20px; margin-bottom: 10px; color: #1e293b; }
        .lock-screen input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .lock-screen button { width: 100%; padding: 12px; background: #E60012; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .viewer-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        .viewer-header { background: rgba(15, 23, 42, 0.95); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .viewer-header .title { font-weight: bold; display: flex; align-items: center; gap: 10px; font-size: 16px; }
        .viewer-header .title i { color: #E60012; }
        
        .viewer-body { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; position: relative; overflow: auto; }
        #flipbook-wrapper { transition: transform 0.2s ease-out; transform-origin: center center; display: flex; justify-content: center; align-items: center; }
        #flipbook { width: 900px; height: 600px; display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .page-node { background: white; width: 450px; height: 600px; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { width: 100% !important; height: 100% !important; object-fit: contain; }

        .nav-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(30, 41, 59, 0.9); padding: 10px 25px; border-radius: 40px; z-index: 100; align-items: center; color: white; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .nav-controls button { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0 10px; transition: 0.2s; }
        .nav-controls button:hover { color: #E60012; transform: scale(1.1); }
        .nav-controls .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
        
        .loading-box { color: white; font-size: 16px; font-weight: bold; text-align: center; position: absolute; }
        .loading-box i { font-size: 35px; margin-bottom: 12px; color: #E60012; display: block; }
    </style>
</head>
<body>

    <div id="lockScreen" class="lock-screen hidden">
        <svg width="64" height="64" viewBox="0 0 100 100" style="border-radius:12px;margin-bottom:15px;"><rect width="100" height="100" rx="16" fill="white" stroke="#eee" stroke-width="2"/><path d="M50 82 C30 64 10 48 10 28 C10 12 24 4 38 10 C44 13 49 20 50 23 C51 20 56 13 62 10 C76 4 90 12 90 28 C90 48 70 64 50 82Z" fill="#E60012"/></svg>
        <h2>둘둘치킨 보안 E-book</h2>
        <p id="lockTarget" style="margin-bottom:20px; font-size:14px; color:#64748b;"></p>
        <input type="password" id="viewerPwdInput" placeholder="인증 비밀번호를 입력하세요">
        <button id="unlockBtn">보안 열람 시작</button>
    </div>

    <div id="viewerScreen" class="viewer-container hidden">
        <div class="viewer-header">
            <div class="title"><svg width="28" height="28" viewBox="0 0 100 100" style="vertical-align:middle;border-radius:6px;flex-shrink:0;"><rect width="100" height="100" rx="16" fill="white"/><path d="M50 82 C30 64 10 48 10 28 C10 12 24 4 38 10 C44 13 49 20 50 23 C51 20 56 13 62 10 C76 4 90 12 90 28 C90 48 70 64 50 82Z" fill="#E60012"/></svg> <span id="docTitleDisplay">문서 로딩 중...</span></div>
            <div id="recipientDisplay" style="color:#94a3b8; font-weight:500;"></div>
        </div>
        
        <div class="viewer-body">
            <div id="loadingBox" class="loading-box"><i class="fas fa-circle-notch fa-spin"></i>안전한 보안 환경에서 전자책을 구성 중입니다...</div>
            <div id="flipbook-wrapper">
                <div id="flipbook"></div>
            </div>
        </div>

        <div class="nav-controls">
            <button id="prevBtn" title="이전 페이지"><i class="fas fa-chevron-left"></i></button>
            <span id="pageIndicator" style="min-width: 60px; text-align: center; font-weight: bold;">0 / 0</span>
            <button id="nextBtn" title="다음 페이지"><i class="fas fa-chevron-right"></i></button>
            <div class="divider"></div>
            <button id="zoomOutBtn" title="축소"><i class="fas fa-magnifying-glass-minus"></i></button>
            <button id="zoomInBtn" title="확대"><i class="fas fa-magnifying-glass-plus"></i></button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAXqFNbDuK-NylDPoHIB4QrpYdbg5BZTEY",
            authDomain: "twotwo-e-book.firebaseapp.com",
            databaseURL: "https://twotwo-e-book-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "twotwo-e-book",
            storageBucket: "twotwo-e-book.firebasestorage.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const shortId = urlParams.get('id');
        let linkData = null;
        let currentZoom = 1.0;

        if (!shortId) {
            document.body.innerHTML = "<div style='color:white; font-weight:bold; padding:20px;'>❌ 유효하지 않은 접근 주소입니다.</div>";
        } else {
            database.ref('issued_links/' + shortId).once('value').then(snapshot => {
                if (!snapshot.exists()) {
                    document.body.innerHTML = "<div style='color:white; font-weight:bold; padding:20px;'>❌ 파기되었거나 존재하지 않는 보안 링크입니다.</div>";
                    return;
                }
                linkData = snapshot.val();
                
                const today = new Date().toISOString().split('T')[0];
                if (linkData.expireDate && today > linkData.expireDate) {
                    document.body.innerHTML = "<div style='color:white; font-weight:bold; padding:20px;'>🔒 열람 기간이 만료된 주소입니다.</div>";
                    return;
                }

                if (linkData.password) {
                    document.getElementById('lockScreen').classList.remove('hidden');
                    document.getElementById('lockTarget').innerText = `${linkData.recipient} 점주님께 발송된 보안 문서입니다.`;
                } else {
                    openSecureViewer();
                }
            }).catch(err => {
                document.body.innerHTML = "<div style='color:white; padding:20px;'>시스템 초기화 실패</div>";
            });
        }

        document.getElementById('unlockBtn').addEventListener('click', () => {
            if (document.getElementById('viewerPwdInput').value === linkData.password) {
                openSecureViewer();
            } else {
                alert('🔑 비밀번호가 일치하지 않습니다.');
            }
        });

        document.getElementById('viewerPwdInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('unlockBtn').click();
        });

        async function openSecureViewer() {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('viewerScreen').classList.remove('hidden');
            document.getElementById('docTitleDisplay').innerText = linkData.fileName;
            document.getElementById('recipientDisplay').innerText = `수신: ${linkData.recipient} 명의`;

            database.ref('master_files/' + linkData.fileKey).once('value').then(async masterSnap => {
                if(!masterSnap.exists()) return alert('마스터 파일을 찾을 수 없습니다.');
                
                const masterData = masterSnap.val();
                
                // 🔥 CORS 에러 완벽 회피 우회 엔진 탑재 (Base64 다이렉트 변환 처리 검증)
                let pdfTarget = masterData.fileUrl;
                if (pdfTarget.startsWith('data:application/pdf;base64,')) {
                    const base64Content = pdfTarget.split(',')[1];
                    const raw = window.atob(base64Content);
                    const rawLength = raw.length;
                    const array = new Uint8Array(new ArrayBuffer(rawLength));
                    for (let i = 0; i < rawLength; i++) { array[i] = raw.charCodeAt(i); }
                    pdfTarget = array;
                }

                const loadingTask = pdfjsLib.getDocument({data: pdfTarget, disableCORS: true, disableAutoFetch: true});
                const pdf = await loadingTask.promise;
                const totalPages = pdf.numPages;
                const flipbook = $('#flipbook');
                
                const renderScale = 2.0;

                for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                    const pageNode = $('<div class="page-node"></div>');
                    const canvas = document.createElement('canvas');
                    pageNode.append(canvas);
                    flipbook.append(pageNode);

                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: renderScale });
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                }

                $('#loadingBox').hide();
                flipbook.show();

                flipbook.turn({
                    width: 900,
                    height: 600,
                    elevation: 50,
                    gradients: true,
                    autoCenter: true,
                    duration: 800,
                    when: {
                        turned: function(e, page) {
                            $('#pageIndicator').text(`${page} / ${totalPages}`);
                        }
                    }
                });

                $('#prevBtn').click(() => flipbook.turn('previous'));
                $('#nextBtn').click(() => flipbook.turn('next'));

                const updateZoom = () => {
                    $('#flipbook-wrapper').css('transform', `scale(${currentZoom})`);
                };

                $('#zoomInBtn').click(() => {
                    if (currentZoom < 2.5) { currentZoom += 0.2; updateZoom(); }
                });

                $('#zoomOutBtn').click(() => {
                    if (currentZoom > 0.5) { currentZoom -= 0.2; updateZoom(); }
                });

                if (linkData.blockDownload === 'Y') {
                    window.addEventListener('keydown', e => {
                        if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u')) e.preventDefault();
                    });
                    document.addEventListener('contextmenu', e => e.preventDefault());
                }

                const nowStr = new Date().toLocaleString();
                const updates = { isViewed: "열람", lastView: nowStr, viewCount: (linkData.viewCount || 0) + 1 };
                if (!linkData.firstView || linkData.firstView === "-") updates.firstView = nowStr;
                database.ref('issued_links/' + shortId).update(updates);
            }).catch(err => {
                alert("보안 뷰어 디코딩 실패: " + err.message);
            });
        }
    </script>
</body>
</html>
