
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>둘둘치킨 E-Book 관리자</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='white'/%3E%3Cpath d='M50 85 C50 85 5 55 5 28 C5 13 17 3 30 3 C38 3 45 7 50 14 C55 7 62 3 70 3 C83 3 95 13 95 28 C95 55 50 85 50 85Z' fill='%23E8001D'/%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════ */
:root {
  --red:#E8001D; --red-dark:#B0001A; --red-hover:#FF1F38;
  --white:#FFFFFF; --off-white:#FFF8F8;
  --g50:#FDF5F5; --g100:#F5E8E8; --g200:#E8D0D0;
  --g400:#B08080; --g600:#6B4040; --black:#1A0A0A;
  --shadow-sm:0 2px 8px rgba(232,0,29,.08);
  --shadow-md:0 8px 32px rgba(232,0,29,.14);
  --shadow-lg:0 24px 64px rgba(232,0,29,.18);
  --radius:14px; --radius-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--off-white);color:var(--black);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ══════════════════════════════════════
   PAGE ROUTER
══════════════════════════════════════ */
.page{display:none;min-height:100vh}
.page.active{display:flex}

/* ══════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════ */
.heart-svg{fill:var(--red)}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--black);color:#fff;padding:11px 22px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════ */
#page-login{
  align-items:center;justify-content:center;
  background:var(--off-white);position:relative;overflow:hidden;
  flex-direction:column;
}
#page-login::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%,rgba(232,0,29,.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%,rgba(232,0,29,.05) 0%,transparent 70%);
  pointer-events:none;
}
.bg-hearts{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.bg-heart{position:absolute;opacity:.04;animation:floatUp linear infinite}
.bg-heart svg{fill:var(--red)}
@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0}
  10%{opacity:.06}90%{opacity:.06}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

.login-card{
  position:relative;background:var(--white);
  border-radius:24px;padding:52px 48px 44px;
  width:100%;max-width:420px;
  box-shadow:var(--shadow-lg);
  animation:slideUp .55s cubic-bezier(.16,1,.3,1) both;
}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.logo-icon{
  width:72px;height:72px;background:var(--white);
  border:1.5px solid var(--red);border-radius:18px;
  display:flex;align-items:center;justify-content:center;margin-bottom:14px;
}
.logo-icon svg{width:46px;height:46px;fill:var(--red)}
.logo-title{font-weight:900;font-size:20px;color:var(--black);letter-spacing:-.5px;text-align:center}
.logo-title em{color:var(--red);font-style:normal}
.logo-sub{margin-top:4px;font-size:12px;color:var(--g400);letter-spacing:.3px}
.login-divider{width:36px;height:3px;background:var(--red);border-radius:2px;margin:0 auto 28px}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--g600);margin-bottom:7px;letter-spacing:.2px}
.form-input{
  width:100%;padding:13px 15px;
  border:2px solid var(--g200);border-radius:var(--radius-sm);
  font-size:15px;font-family:'Noto Sans KR',sans-serif;
  color:var(--black);background:var(--g50);
  transition:border-color .2s,box-shadow .2s,background .2s;outline:none;
}
.form-input:focus{border-color:var(--red);background:var(--white);box-shadow:0 0 0 4px rgba(232,0,29,.08)}
.form-input::placeholder{color:var(--g400)}

.btn-primary{
  width:100%;padding:14px;background:var(--red);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;margin-top:6px;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(232,0,29,.28);
}
.btn-primary:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:0 8px 24px rgba(232,0,29,.38)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{background:var(--g200);color:var(--g400);box-shadow:none;cursor:not-allowed;transform:none}

.login-error{
  display:none;margin-top:13px;padding:11px 15px;
  background:rgba(232,0,29,.07);border:1px solid rgba(232,0,29,.18);
  border-radius:var(--radius-sm);font-size:13px;color:var(--red-dark);
  text-align:center;font-weight:500;
}
.login-error.show{display:block;animation:shake .38s ease}
.login-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--g400)}

/* ══════════════════════════════════════
   DASHBOARD LAYOUT
══════════════════════════════════════ */
#page-dashboard{flex-direction:column;background:var(--g50)}

/* Top Nav */
.topnav{
  background:var(--white);border-bottom:1.5px solid var(--g100);
  padding:0 28px;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);
}
.topnav-left{display:flex;align-items:center;gap:12px}
.topnav-icon{
  width:36px;height:36px;background:var(--white);
  border:1.5px solid var(--red);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
}
.topnav-icon svg{width:22px;height:22px;fill:var(--red)}
.topnav-title{font-weight:900;font-size:16px;color:var(--black);letter-spacing:-.3px}
.topnav-right{display:flex;align-items:center;gap:12px}
.badge-role{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.badge-role.super{background:rgba(232,0,29,.10);color:var(--red)}
.badge-role.staff{background:var(--g100);color:var(--g600)}
.user-email{font-size:12px;color:var(--g600);font-weight:500}
.btn-logout{
  padding:6px 14px;border:1.5px solid var(--g200);border-radius:8px;
  background:none;font-size:12px;font-family:'Noto Sans KR',sans-serif;
  color:var(--g600);cursor:pointer;font-weight:600;
  transition:border-color .2s,color .2s;
}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* Tab Nav */
.tab-nav{
  background:var(--white);border-bottom:1.5px solid var(--g100);
  padding:0 28px;display:flex;gap:0;
}
.tab-btn{
  padding:14px 20px;border:none;background:none;
  font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  color:var(--g400);cursor:pointer;border-bottom:3px solid transparent;
  margin-bottom:-1.5px;transition:color .2s,border-color .2s;
}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}
.tab-btn:hover:not(.active){color:var(--g600)}

/* Tab Content */
.tab-content{display:none;flex:1;overflow:hidden}
.tab-content.active{display:flex}

/* ── TAB 1: 링크 생성 ── */
.create-layout{
  display:grid;grid-template-columns:380px 1fr;
  width:100%;overflow:hidden;
  max-height:calc(100vh - 62px - 48px);
}

/* Left Panel */
.left-panel{
  background:var(--white);border-right:1.5px solid var(--g100);
  overflow-y:auto;padding:24px 22px;
}
.panel-title{
  font-size:14px;font-weight:900;color:var(--black);
  margin-bottom:18px;display:flex;align-items:center;gap:8px;
}
.panel-title::before{
  content:'';display:inline-block;width:4px;height:16px;
  background:var(--red);border-radius:2px;
}

/* Drop zone */
.drop-zone{
  border:2px dashed var(--g200);border-radius:var(--radius);
  padding:28px 16px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;margin-bottom:16px;
  position:relative;background:var(--g50);
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--red);background:rgba(232,0,29,.03)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:32px;margin-bottom:8px}
.drop-text{font-size:13px;font-weight:700;color:var(--g600);margin-bottom:3px}
.drop-sub{font-size:11px;color:var(--g400)}

.file-selected{
  display:none;align-items:center;gap:10px;
  padding:11px 13px;background:var(--g50);
  border-radius:var(--radius-sm);margin-bottom:14px;
  border:1px solid var(--g100);
}
.file-selected.show{display:flex}
.file-name{font-size:12px;font-weight:700;color:var(--black);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-size{font-size:11px;color:var(--g400);white-space:nowrap}
.file-remove{background:none;border:none;color:var(--g400);cursor:pointer;font-size:15px;padding:2px;line-height:1}
.file-remove:hover{color:var(--red)}

/* Progress */
.progress-wrap{display:none;margin-bottom:14px}
.progress-wrap.show{display:block}
.progress-bar-bg{height:5px;background:var(--g100);border-radius:3px;overflow:hidden;margin-bottom:5px}
.progress-bar{height:100%;background:var(--red);border-radius:3px;transition:width .25s;width:0%}
.progress-txt{font-size:11px;color:var(--g600);font-weight:600}

/* Settings */
.setting-group{margin-bottom:14px}
.setting-label{display:block;font-size:11px;font-weight:700;color:var(--g600);margin-bottom:6px;letter-spacing:.2px}
.setting-input{
  width:100%;padding:10px 13px;
  border:2px solid var(--g200);border-radius:var(--radius-sm);
  font-size:13px;font-family:'Noto Sans KR',sans-serif;
  color:var(--black);background:var(--g50);outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.setting-input:focus{border-color:var(--red);background:var(--white);box-shadow:0 0 0 3px rgba(232,0,29,.08)}
.setting-input::placeholder{color:var(--g400)}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Toggle */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 13px;background:var(--g50);
  border-radius:var(--radius-sm);margin-bottom:7px;
  border:1px solid var(--g100);
}
.toggle-info .t-name{font-size:12px;font-weight:700;color:var(--black)}
.toggle-info .t-desc{font-size:10px;color:var(--g400);margin-top:1px}
.toggle{position:relative;width:42px;height:23px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;background:var(--g200);
  border-radius:12px;cursor:pointer;transition:background .2s;
}
.toggle-slider::before{
  content:'';position:absolute;width:17px;height:17px;
  left:3px;top:3px;background:#fff;border-radius:50%;
  transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.toggle input:checked+.toggle-slider{background:var(--red)}
.toggle input:checked+.toggle-slider::before{transform:translateX(19px)}

.pw-field{display:none;margin-top:7px}
.pw-field.show{display:block}

/* Generate btn */
.btn-generate{
  width:100%;padding:13px;background:var(--red);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;margin-top:6px;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(232,0,29,.26);
}
.btn-generate:hover{background:var(--red-dark);transform:translateY(-1px)}
.btn-generate:disabled{background:var(--g200);color:var(--g400);box-shadow:none;cursor:not-allowed;transform:none}

/* Link result */
.link-result{display:none;margin-top:14px;padding:14px;background:rgba(232,0,29,.05);border:1px solid rgba(232,0,29,.18);border-radius:var(--radius-sm)}
.link-result.show{display:block}
.link-result-label{font-size:11px;font-weight:700;color:var(--red);margin-bottom:8px;letter-spacing:.3px}
.link-url-box{
  font-size:12px;color:var(--black);word-break:break-all;
  background:var(--white);padding:9px 11px;border-radius:8px;
  border:1px solid var(--g200);margin-bottom:8px;font-weight:500;
  font-family:monospace;
}
.link-short-box{
  font-size:13px;font-weight:700;color:var(--red);
  background:var(--white);padding:9px 11px;border-radius:8px;
  border:1px solid rgba(232,0,29,.25);margin-bottom:10px;
  font-family:monospace;word-break:break-all;
}
.btn-copy-link{
  width:100%;padding:9px;background:var(--red);color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background .2s;
}
.btn-copy-link:hover{background:var(--red-dark)}

/* Right Panel - 링크 목록 */
.right-panel{overflow-y:auto;padding:24px}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.stat-chips{display:flex;gap:8px}
.stat-chip{padding:5px 13px;background:var(--white);border:1px solid var(--g200);border-radius:20px;font-size:12px;font-weight:700;color:var(--g600)}
.stat-chip span{color:var(--red)}
.list-search{
  width:200px;padding:8px 13px;border:1.5px solid var(--g200);
  border-radius:var(--radius-sm);font-size:13px;
  font-family:'Noto Sans KR',sans-serif;outline:none;
  transition:border-color .2s;
}
.list-search:focus{border-color:var(--red)}

/* Link Cards */
.link-cards{display:flex;flex-direction:column;gap:10px}
.link-card{
  background:var(--white);border-radius:var(--radius);
  padding:16px 18px;box-shadow:var(--shadow-sm);
  border:1px solid var(--g100);
  transition:box-shadow .2s,transform .2s;
  animation:cardIn .3s ease both;
}
.link-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.link-card.inactive{opacity:.5}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px}
.card-customer{font-size:15px;font-weight:900;color:var(--black)}
.card-file{font-size:11px;color:var(--g400);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.card-badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-active{background:rgba(0,180,60,.12);color:#006428}
.badge-inactive{background:var(--g100);color:var(--g600)}
.badge-expired{background:var(--g100);color:var(--g600)}
.badge-pw{background:rgba(232,0,29,.10);color:var(--red)}
.badge-nodl{background:rgba(255,140,0,.12);color:#8B4500}
.card-meta-row{display:flex;gap:14px;margin-bottom:10px}
.card-meta{font-size:11px;color:var(--g400)}
.card-meta strong{color:var(--g600);font-weight:600}
.card-url-row{display:flex;align-items:center;gap:8px;background:var(--g50);border-radius:8px;padding:7px 11px;border:1px solid var(--g100)}
.card-url{font-size:11px;color:var(--g600);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.card-short{font-size:11px;color:var(--red);font-weight:700;font-family:monospace;white-space:nowrap}
.card-actions{display:flex;gap:5px;margin-top:9px}
.btn-card{
  padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  border:1px solid var(--g200);background:var(--white);
  color:var(--g600);transition:all .15s;
}
.btn-card:hover{border-color:var(--red);color:var(--red)}
.btn-card.copy{background:var(--red);color:#fff;border-color:var(--red)}
.btn-card.copy:hover{background:var(--red-dark)}
.btn-card.danger:hover{border-color:#c00;color:#c00}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;color:var(--g400)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}

/* ── TAB 2: 통계 ── */
.stats-layout{width:100%;overflow-y:auto;padding:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--g100);animation:cardIn .3s ease both}
.stat-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.stat-customer{font-size:15px;font-weight:900;color:var(--black)}
.stat-file{font-size:11px;color:var(--g400);margin-top:2px}
.stat-viewed{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700}
.stat-viewed.yes{color:#006428}
.stat-viewed.no{color:var(--g400)}
.stat-rows{display:flex;flex-direction:column;gap:7px}
.stat-row{display:flex;justify-content:space-between;font-size:12px}
.stat-row-label{color:var(--g400)}
.stat-row-val{font-weight:700;color:var(--black)}
.stat-progress{margin-top:10px}
.stat-progress-label{font-size:11px;color:var(--g400);margin-bottom:4px;display:flex;justify-content:space-between}
.stat-bar-bg{height:5px;background:var(--g100);border-radius:3px;overflow:hidden}
.stat-bar{height:100%;background:var(--red);border-radius:3px;transition:width .5s}
.stats-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;text-align:center;color:var(--g400);width:100%}

/* Responsive */
@media(max-width:900px){
  .create-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr;max-height:none}
  .left-panel{max-height:55vh;border-right:none;border-bottom:1.5px solid var(--g100)}
  .topnav{padding:0 14px}
  .topnav-title{display:none}
  .user-email{display:none}
  .tab-nav{padding:0 14px}
}
@media(max-width:480px){
  .login-card{padding:38px 24px 32px}
  .date-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="heart" viewBox="0 0 100 90">
    <path d="M50 85 C50 85 5 55 5 28 C5 13 17 3 30 3 C38 3 45 7 50 14 C55 7 62 3 70 3 C83 3 95 13 95 28 C95 55 50 85 50 85Z"/>
  </symbol>
</svg>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="page-login" class="page active">
  <div class="bg-hearts" id="bgHearts"></div>
  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-icon"><svg viewBox="0 0 100 90"><use href="#heart"/></svg></div>
      <div class="logo-title">둘둘치킨 <em>E-Book</em></div>
      <div class="logo-sub">관리자 시스템</div>
    </div>
    <div class="login-divider"></div>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input type="email" id="loginEmail" class="form-input" placeholder="admin@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" id="loginPw" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="btnLogin">로그인</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-footer">© 2026 둘둘치킨 E-Book 관리시스템</div>
  </div>
</div>

<!-- ═══════════ DASHBOARD ═══════════ -->
<div id="page-dashboard" class="page" style="flex-direction:column">
  <!-- Top Nav -->
  <nav class="topnav">
    <div class="topnav-left">
      <div class="topnav-icon"><svg viewBox="0 0 100 90"><use href="#heart"/></svg></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, query, orderBy, onSnapshot }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

// ── Config ──
const FB = {
  apiKey:"AIzaSyAXqFNbDuK-NylDPoHIB4QrpYdbg5BZTEY",
  authDomain:"twotwo-e-book.firebaseapp.com",
  projectId:"twotwo-e-book",
  storageBucket:"twotwo-e-book.firebasestorage.app",
  messagingSenderId:"1018023949536",
  appId:"1:1018023949536:web:6b0d7de3ad822746708c85"
};
const SUPER_ADMIN = "sweetysooh@gmail.com";
const BITLY_TOKEN = "bb1dd2c494496ad5d4456dd552bb849fa0054af2";
const VIEWER_BASE = "https://charllottesooh.github.io/E-book/viewer.html";

const app     = initializeApp(FB);
const auth    = getAuth(app);
const db      = getFirestore(app);
const storage = getStorage(app);

// ── Auth ──
onAuthStateChanged(auth, user => {
  if(user){
    const role = user.email===SUPER_ADMIN ? "super" : "staff";
    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("roleBadge").textContent = role==="super" ? "슈퍼관리자" : "일반직원";
    document.getElementById("roleBadge").className = "badge-role "+(role==="super"?"super":"staff");
    showPage("dashboard");
    loadLinks();
    setupStatsListener();
  } else {
    showPage("login");
  }
});

// ── Login ──
document.getElementById("btnLogin").onclick = async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  const btn   = document.getElementById("btnLogin");
  if(!email||!pw){showLoginErr("이메일과 비밀번호를 입력해 주세요.");return}
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>로그인 중...';
  try{
    await signInWithEmailAndPassword(auth,email,pw);
  }catch(e){
    const m={
      "auth/invalid-credential":"이메일 또는 비밀번호를 확인해 주세요.",
      "auth/too-many-requests":"잠시 후 다시 시도해 주세요.",
      "auth/invalid-email":"이메일 형식이 올바르지 않습니다."
    };
    showLoginErr(m[e.code]||"로그인 중 오류가 발생했습니다.");
  }finally{btn.disabled=false;btn.innerHTML="로그인"}
};
document.getElementById("btnLogout").onclick = ()=>signOut(auth);
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&document.getElementById("page-login").classList.contains("active"))
    document.getElementById("btnLogin").click();
});

// ── File ──
let selectedFile=null;
const fileInput=document.getElementById("fileInput");
const dropZone=document.getElementById("dropZone");

fileInput.onchange=()=>handleFile(fileInput.files[0]);
document.getElementById("fileRemove").onclick=()=>{
  selectedFile=null;
  fileInput.value="";
  document.getElementById("fileSelected").classList.remove("show");
  dropZone.style.display="";
  document.getElementById("linkResult").classList.remove("show");
};
dropZone.addEventListener("dragover",e=>{e.preventDefault();dropZone.classList.add("drag-over")});
dropZone.addEventListener("dragleave",()=>dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop",e=>{
  e.preventDefault();dropZone.classList.remove("drag-over");
  handleFile(e.dataTransfer.files[0]);
});

function handleFile(f){
  if(!f) return;
  if(f.type!=="application/pdf"){showToast("PDF 파일만 가능합니다.");return}
  if(f.size>52428800){showToast("50MB 이하 파일만 가능합니다.");return}
  selectedFile=f;
  document.getElementById("fileName").textContent=f.name;
  document.getElementById("fileSize").textContent=(f.size/1048576).toFixed(1)+"MB";
  document.getElementById("fileSelected").classList.add("show");
  dropZone.style.display="none";
}

document.getElementById("usePassword").onchange=function(){
  document.getElementById("pwField").classList.toggle("show",this.checked);
};

// ── Generate Link ──
document.getElementById("btnGenerate").onclick = async () => {
  if(!selectedFile){showToast("PDF 파일을 먼저 선택해 주세요.");return}
  const customerName=document.getElementById("customerName").value.trim();
  if(!customerName){showToast("고객명을 입력해 주세요.");return}

  const btn=document.getElementById("btnGenerate");
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>업로드 중...';

  try{
    // 1. Storage 업로드
    const pdfUrl = await uploadPDF(selectedFile);

    // 2. 링크 ID 생성
    const linkId = genId();

    // 3. 설정
    const usePassword=document.getElementById("usePassword").checked;
    const password=usePassword?document.getElementById("linkPassword").value:null;
    const noDownload=document.getElementById("noDownload").checked;
    const expireDays=parseInt(document.getElementById("expireDays").value)||0;
    const sendDate=document.getElementById("sendDate").value||today();
    const expireDate=expireDays>0?addDays(expireDays):null;
    const viewerUrl=`${VIEWER_BASE}?id=${linkId}`;

    // 4. 단축 URL 생성
    btn.innerHTML='<span class="spinner"></span>단축 URL 생성 중...';
    const shortUrl = await createShortUrl(viewerUrl);

    // 5. Firestore 저장
    await setDoc(doc(db,"links",linkId),{
      id:linkId, customerName,
      fileName:selectedFile.name, pdfUrl,
      usePassword, password, noDownload,
      sendDate, expireDate, active:true,
      viewerUrl, shortUrl,
      createdAt:new Date().toISOString(),
      createdBy:auth.currentUser?.email||"",
    });

    // 6. 결과 표시
    document.getElementById("generatedUrl").textContent=viewerUrl;
    document.getElementById("generatedShort").textContent=shortUrl||viewerUrl;
    document.getElementById("linkResult").classList.add("show");

    document.getElementById("btnCopyShort").onclick=()=>{
      navigator.clipboard.writeText(shortUrl||viewerUrl)
        .then(()=>showToast("단축 링크 복사 완료!"));
    };

    showToast("✅ 링크 생성 완료!");
    // 폼 초기화
    document.getElementById("fileRemove").click();
    document.getElementById("customerName").value="";
    document.getElementById("expireDays").value="";
    document.getElementById("usePassword").checked=false;
    document.getElementById("noDownload").checked=true;
    document.getElementById("linkPassword").value="";
    document.getElementById("pwField").classList.remove("show");

  }catch(e){
    console.error(e);
    showToast("오류: "+e.message);
  }finally{
    btn.disabled=false;
    btn.innerHTML="🔗 링크 생성하기";
  }
};

// ── Upload PDF ──
function uploadPDF(file){
  return new Promise((resolve,reject)=>{
    const ext=file.name.split('.').pop();
    const name=Date.now()+"_"+Math.random().toString(36).slice(2)+"."+ext;
    const storageRef=ref(storage,"ebooks/"+name);
    const task=uploadBytesResumable(storageRef,file);
    task.on("state_changed",
      snap=>{
        const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);
        document.getElementById("progressWrap").classList.add("show");
        document.getElementById("progressBar").style.width=pct+"%";
        document.getElementById("progressTxt").textContent="업로드 중... "+pct+"%";
      },
      err=>{document.getElementById("progressWrap").classList.remove("show");reject(err)},
      async()=>{
        document.getElementById("progressWrap").classList.remove("show");
        document.getElementById("progressBar").style.width="0%";
        resolve(await getDownloadURL(task.snapshot.ref));
      }
    );
  });
}

// ── Bitly 단축 URL ──
async function createShortUrl(longUrl){
  try{
    const res=await fetch("https://api-ssl.bitly.com/v4/shorten",{
      method:"POST",
      headers:{"Authorization":"Bearer "+BITLY_TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify({long_url:longUrl})
    });
    const data=await res.json();
    return data.link||longUrl;
  }catch(e){
    console.error("Bitly 오류:",e);
    return longUrl;
  }
}

// ── Load Links ──
let unsubLinks=null;
function loadLinks(){
  if(unsubLinks) unsubLinks();
  const q=query(collection(db,"links"),orderBy("createdAt","desc"));
  unsubLinks=onSnapshot(q,snap=>{
    window._links=snap.docs.map(d=>d.data());
    renderLinks();
  });
}

document.getElementById("searchInput").oninput=renderLinks;

function renderLinks(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const links=(window._links||[]).filter(l=>l.customerName?.toLowerCase().includes(q));
  const active=links.filter(l=>l.active&&!isExpired(l)).length;
  document.getElementById("statTotal").textContent=links.length;
  document.getElementById("statActive").textContent=active;

  const c=document.getElementById("linkCards");
  if(!links.length){
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><p style="font-size:14px">검색 결과 없음</p></div>`;
    return;
  }
  c.innerHTML=links.map(l=>{
    const exp=isExpired(l);
    const sb=!l.active?`<span class="badge badge-inactive">비활성</span>`:
      exp?`<span class="badge badge-expired">만료됨</span>`:
      `<span class="badge badge-active">활성</span>`;
    const short=l.shortUrl?`<span class="card-short">🔗 ${l.shortUrl}</span>`:"";
    return `<div class="link-card ${!l.active||exp?"inactive":""}">
      <div class="card-top">
        <div>
          <div class="card-customer">${l.customerName}</div>
          <div class="card-file">📄 ${l.fileName||""}</div>
        </div>
        <div class="card-badges">
          ${sb}
          ${l.usePassword?'<span class="badge badge-pw">🔐 비번</span>':""}
          ${l.noDownload?'<span class="badge badge-nodl">🚫 다운금지</span>':""}
        </div>
      </div>
      <div class="card-meta-row">
        <div class="card-meta">발송 <strong>${l.sendDate||"-"}</strong></div>
        <div class="card-meta">만료 <strong>${l.expireDate||"무제한"}</strong></div>
        <div class="card-meta">등록자 <strong>${(l.createdBy||"").split("@")[0]}</strong></div>
      </div>
      <div class="card-url-row">
        ${short}
        <span class="card-url">${l.viewerUrl||""}</span>
      </div>
      <div class="card-actions">
        <button class="btn-card copy" onclick="copyUrl('${l.shortUrl||l.viewerUrl||""}')">링크복사</button>
        <button class="btn-card" onclick="toggleActive('${l.id}',${!l.active})">${l.active?"비활성화":"활성화"}</button>
        <button class="btn-card danger" onclick="deleteLink('${l.id}','${encodeURIComponent(l.pdfUrl||"")}')">삭제</button>
      </div>
    </div>`;
  }).join("");
}

window.copyUrl=url=>{
  navigator.clipboard.writeText(url).then(()=>showToast("링크 복사 완료!"));
};

window.toggleActive=async(id,active)=>{
  await updateDoc(doc(db,"links",id),{active});
  showToast(active?"활성화 완료":"비활성화 완료");
};

window.deleteLink=async(id,encodedUrl)=>{
  if(!confirm("이 링크를 삭제할까요?")) return;
  await deleteDoc(doc(db,"links",id));
  try{
    const url=decodeURIComponent(encodedUrl);
    if(url){
      const path=url.split("/o/")[1]?.split("?")[0];
      if(path) await deleteObject(ref(storage,decodeURIComponent(path)));
    }
  }catch(e){}
  showToast("삭제 완료");
};

// ── Stats ──
let unsubStats=null;
function setupStatsListener(){
  if(unsubStats) unsubStats();
  unsubStats=onSnapshot(collection(db,"stats"),snap=>{
    window._stats={};
    snap.docs.forEach(d=>window._stats[d.id]=d.data());
    renderStats();
  });
}

function renderStats(){
  const links=window._links||[];
  const stats=window._stats||{};
  const grid=document.getElementById("statsGrid");

  if(!links.length){
    grid.innerHTML=`<div class="stats-empty"><div class="empty-icon">📊</div><p style="font-size:14px">아직 데이터가 없습니다.</p></div>`;
    return;
  }

  grid.innerHTML=links.map(l=>{
    const s=stats[l.id]||{};
    const viewed=!!s.firstViewAt;
    const pct=l.totalPages?Math.round((s.lastPage||0)/l.totalPages*100):0;
    const device=s.device==="mobile"?"📱 모바일":"🖥 PC";
    return `<div class="stat-card">
      <div class="stat-card-header">
        <div>
          <div class="stat-customer">${l.customerName}</div>
          <div class="stat-file">📄 ${l.fileName||""}</div>
        </div>
        <div class="stat-viewed ${viewed?"yes":"no"}">
          ${viewed?"✅ 열람함":"⬜ 미열람"}
        </div>
      </div>
      <div class="stat-rows">
        <div class="stat-row"><span class="stat-row-label">최초 열람</span><span class="stat-row-val">${s.firstViewAt?fmtDate(s.firstViewAt):"-"}</span></div>
        <div class="stat-row"><span class="stat-row-label">마지막 열람</span><span class="stat-row-val">${s.lastViewAt?fmtDate(s.lastViewAt):"-"}</span></div>
        <div class="stat-row"><span class="stat-row-label">열람 횟수</span><span class="stat-row-val">${s.viewCount||0}회</span></div>
        <div class="stat-row"><span class="stat-row-label">마지막 본 페이지</span><span class="stat-row-val">${s.lastPage||0} / ${l.totalPages||"?"} 페이지</span></div>
        <div class="stat-row"><span class="stat-row-label">접속 기기</span><span class="stat-row-val">${s.viewCount?device:"-"}</span></div>
      </div>
      ${l.totalPages?`<div class="stat-progress">
        <div class="stat-progress-label"><span>열람 진행률</span><span>${pct}%</span></div>
        <div class="stat-bar-bg"><div class="stat-bar" style="width:${pct}%"></div></div>
      </div>`:""}
    </div>`;
  }).join("");
}

// ── Utils ──
function genId(){return Math.random().toString(36).slice(2,8)+Math.random().toString(36).slice(2,8)}
function today(){return new Date().toISOString().split("T")[0]}
function addDays(n){return new Date(Date.now()+n*86400000).toISOString().split("T")[0]}
function isExpired(l){return l.expireDate&&new Date(l.expireDate)<new Date(today())}
function fmtDate(iso){
  const d=new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
</script>

<script>
// ── Tab switch ──
window.switchTab=function(name){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.classList.toggle("active",["create","stats"][i]===name);
  });
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  if(name==="stats") renderStats?.();
};

function showPage(name){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+name).classList.add("active");
}

function showLoginErr(msg){
  const el=document.getElementById("loginError");
  el.textContent=msg;el.classList.remove("show");
  void el.offsetWidth;el.classList.add("show");
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2600);
}

// Floating hearts
(function(){
  const c=document.getElementById("bgHearts");
  for(let i=0;i<12;i++){
    const d=document.createElement("div");
    d.className="bg-heart";
    const s=20+Math.random()*60;
    d.style.cssText=`left:${Math.random()*100}%;bottom:-${s}px;width:${s}px;height:${s}px;animation-duration:${12+Math.random()*18}s;animation-delay:${Math.random()*15}s;`;
    d.innerHTML=`<svg viewBox="0 0 100 90" width="${s}" height="${s}"><use href="#heart"/></svg>`;
    c.appendChild(d);
  }
})();
</script>
